<!DOCTYPE html>
<html>
<head>
    <title>Jewellery Shop Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #1f2937;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .container {
            padding: 20px;
        }

        h2 {
            margin-top: 0;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-add { background: green; color: white; }
        .btn-sale { background: blue; color: white; }
        .btn-delete { background: red; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        table th, table td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        table th {
            background: #f1f1f1;
        }

        form {
            display: inline;
        }

        input[type="number"] {
            width: 60px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div><strong>Jewellery Shop</strong></div>
    <div>
        <a href="{{ url_for('sales') }}">Sales History</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

<div class="container">

    <h2>Dashboard</h2>

    <a href="{{ url_for('add_product') }}" class="btn btn-add">
        + Add Product
    </a>

    <br><br>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price (₹)</th>
            <th>Stock</th>
            <th>Sale</th>
            <th>Delete</th>
        </tr>

        {% for product in products %}
        <tr>
            <td>{{ product.id }}</td>
            <td>{{ product.name }}</td>
            <td>{{ product.price }}</td>
            <td>{{ product.stock }}</td>

            <td>
                <form action="{{ url_for('make_sale', id=product.id) }}" method="POST">
                    <input type="number" name="quantity" min="1" required>
                    <button type="submit" class="btn btn-sale">Sell</button>
                </form>
            </td>

            <td>
                <a href="{{ url_for('delete_product', id=product.id) }}" class="btn btn-delete">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
