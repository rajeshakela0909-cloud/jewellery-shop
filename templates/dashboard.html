<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #1f2937;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .container {
            padding: 20px;
        }

        h2 {
            margin-top: 0;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
        }

        .btn-add {
            background: green;
        }

        .btn-sale {
            background: #2563eb;
        }

        .btn-edit {
            background: orange;
        }

        .btn-delete {
            background: red;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #e5e7eb;
        }

        .low-stock {
            background-color: #ffe5e5;
            color: red;
            font-weight: bold;
        }

        .search-box {
            margin-bottom: 15px;
        }

        input[type="text"] {
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 12px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div><strong>Jewellery Shop</strong></div>
    <div>
        <a href="/sales">Sales History</a>
        <a href="/monthly-report">Monthly Report</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <h2>Dashboard</h2>

    <div class="search-box">
        <form method="GET" action="/dashboard">
            <input type="text" name="search" placeholder="Search product...">
            <button type="submit">Search</button>
            <a href="/dashboard">Clear</a>
        </form>
    </div>

    <a href="/add" class="btn btn-add">+ Add Product</a>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price (₹)</th>
            <th>Stock</th>
            <th>Sale</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>

        {% for product in products %}
        <tr {% if product['stock'] < 5 %} class="low-stock" {% endif %}>
            <td>{{ product['id'] }}</td>
            <td>{{ product['name'] }}</td>
            <td>₹ {{ product['price'] }}</td>
            <td>{{ product['stock'] }}</td>
            <td>
                <a href="/sale/{{ product['id'] }}" class="btn btn-sale">Make Sale</a>
            </td>
            <td>
                <a href="/edit/{{ product['id'] }}" class="btn btn-edit">Edit</a>
            </td>
            <td>
                <a href="/delete/{{ product['id'] }}" class="btn btn-delete"
                   onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
